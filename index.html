<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yahtzee Score Sheet</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#333333">
</head>
<body>
    <header>
        <h1>Yahtzee <span style="font-size: 0.5em; opacity: 0.5;">v4</span></h1>
        <div class="controls">
            <input type="text" id="new-player-name" placeholder="Name..." maxlength="12">
            <button id="add-player-btn">+ Add</button>
            <button id="reset-btn">Reset</button>
        </div>
    </header>
    
    <main>
        <div class="table-container">
            <table id="score-table">
                </table>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.error('Service Worker failure:', err));
            });
        }
    </script>
</body>
</html>
